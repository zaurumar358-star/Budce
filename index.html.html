.sync-dot.error{background:#ff7b7b}

.sync-txt{font-size:11px;opacity:.8}
.kpi-bar{background:#162a4e;padding:8px 20px;display:flex;overflow-x:auto}
.kpi{flex:1;min-width:110px;padding:6px 14px;border-right:1px solid rgba(255,255,255,.1);text-align:center}
.kpi:last-child{border-right:none}
.kpi-label{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.kpi-val{font-size:16px;font-weight:700;color:#fff}
.kpi-val.pos{color:#6ee77a}.kpi-val.neg{color:#ff7b7b}
.kpi-sub{font-size:9px;margin-top:1px}

.stat-val{font-size:18px;font-weight:700}

.status-icon{font-size:24px;flex-shrink:0}
.status-title{font-size:14px;font-weight:700;margin-bottom:1px}
.status-desc{font-size:11px;color:#555;line-height:1.4}

.cal-month{font-size:14px;font-weight:700;color:#1F3864}

.cal-day{border:1px solid #eee;border-radius:7px;padding:4px 5px;min-height:54px;cursor:pointer;transition:all .12s;background:#fff}

.cal-day.today{border-color:#1F3864;border-width:2px}
.cal-day.selected{background:#eef3ff;border-color:#1F3864}
.cal-day.other-month{opacity:.22;cursor:default;pointer-events:none}
.cal-day.has-rec{background:#f5f0ff}
.day-num{font-size:10px;font-weight:700;color:#777}
.day-exp{font-size:9px;color:#8b1a1a;font-weight:600;margin-top:1px}
.day-inc{font-size:9px;color:#1a5c2a;font-weight:600}
.day-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.dot{width:4px;height:4px;border-radius:50%}

.modal{background:#fff;border-radius:14px;padding:20px;width:400px;max-width:100%;max-height:92vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:700;margin-bottom:12px;color:#1F3864}
.form-row{margin-bottom:11px}
.form-row label{display:block;font-size:10px;font-weight:700;color:#777;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.form-row input,.form-row select{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#1F3864}
.form-row .hint{font-size:10px;color:#bbb;margin-top:2px}
.btn-row{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#333;cursor:pointer;font-size:12px;font-weight:600}
.btn:hover{background:#f5f5f5}
.btn.pr{background:#1F3864;color:#fff;border-color:#1F3864}.btn.pr:hover{background:#162a4e}
.btn.pu{background:#4a1a8b;color:#fff;border-color:#4a1a8b}.btn.pu:hover{background:#3a1570}

.entry-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ei{display:flex;align-items:flex-start;gap:7px;padding:7px 10px;border-radius:8px;border:1px solid #eee;background:#fafafa;font-size:12px}
.ei.rec-ei{border-left:3px solid #7a3abf;background:#f8f4ff}
.ei-cat{flex:1;min-width:0}
.ei-amt{font-weight:700;font-size:12px;min-width:70px;text-align:right;white-space:nowrap}

.ei-del:hover{color:#8b1a1a;background:#fff0f0}
.ei-edit{cursor:pointer;color:#bbb;padding:2px 5px;border-radius:4px;font-size:11px;flex-shrink:0}
.ei-edit:hover{color:#1F3864;background:#eef3ff}

let S = JSON.parse(JSON.stringify(INITIAL_DATA));

function syncStatus(status, txt){
  const dot = document.getElementById('sync-dot');
  const t = document.getElementById('sync-txt');
  dot.className = 'sync-dot' + (status==='syncing'?' syncing':status==='error'?' error':'');
  t.textContent = txt;
}

async function dbGet(){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}&select=data`, {
      headers:{
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    const rows = await r.json();
    if(rows && rows.length > 0 && rows[0].data){
      return JSON.parse(rows[0].data);
    }
    return null;
  }catch(e){ return null; }
}

async function dbSet(data){
  const body = JSON.stringify({id: ROW_ID, data: JSON.stringify(data)});
  // Try upsert
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: 'POST',
    headers:{
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: body
  });
  return r.ok || r.status === 201;
}

let saveTimer = null;
function save(){
  try{localStorage.setItem('budce_local', JSON.stringify(S));}catch(e){}
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    syncStatus('syncing','Saxlanır...');
    try{
      const ok = await dbSet(S);
      if(ok){ syncStatus('ok','✅ Sinxron'); }
      else{ syncStatus('error','⚠️ Lokal'); }
    }catch(e){ syncStatus('error','⚠️ Lokal'); }
  }, 800);
}

async function init(){
  syncStatus('syncing','Yüklənir...');
  // Try to get from DB
  const remote = await dbGet();
  if(remote && remote.entries){
    S = remote;
    syncStatus('ok','✅ Sinxron');
  } else {
    // First time — upload initial data
    syncStatus('syncing','İlk yükləmə...');
    const ok = await dbSet(S);
    if(ok){ syncStatus('ok','✅ Sinxron'); }
    else{
      // Try localStorage
      try{
        const local = localStorage.getItem('budce_local');
        if(local){ Object.assign(S, JSON.parse(local)); }
      }catch(e){}
      syncStatus('error','📱 Lokal rejim');
    }
  }
  applyRec(S.calYear, S.calMonth);
  renderKPI();
  renderCal();
}

function fmt(n){return Number(n).toLocaleString('az-AZ',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtS(n){if(Math.abs(n)>=1000)return(n/1000).toFixed(1)+'k';return Number(n).toFixed(0);}
function getCat(id){return S.categories.find(c=>c.id===id);}
function eForDay(ds){return S.entries.filter(e=>e.date===ds);}
function eForMonth(y,m){return S.entries.filter(e=>{const d=new Date(e.date);return d.getFullYear()===y&&d.getMonth()===m;});}
function eForYear(y){return S.entries.filter(e=>new Date(e.date).getFullYear()===y);}
function mInc(y,m){return eForMonth(y,m).filter(e=>{const c=getCat(e.catId);return c&&c.type==='income';}).reduce((s,e)=>s+e.amount,0);}
function mExp(y,m){return eForMonth(y,m).filter(e=>{const c=getCat(e.catId);return c&&c.type==='expense';}).reduce((s,e)=>s+e.amount,0);}
function yInc(y){return eForYear(y).filter(e=>{const c=getCat(e.catId);return c&&c.type==='income';}).reduce((s,e)=>s+e.amount,0);}
function yExp(y){return eForYear(y).filter(e=>{const c=getCat(e.catId);return c&&c.type==='expense';}).reduce((s,e)=>s+e.amount,0);}
function recOk(r,y,m){if(!r.active)return false;if(r.freq==='monthly')return true;return(r.months||[]).includes(m);}
function recDS(r,y,m){const ld=new Date(y,m+1,0).getDate();const d=Math.min(r.dayOfMonth||1,ld);return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function applyRec(y,m){
  S.recurring.forEach(r=>{
    if(!recOk(r,y,m))return;
    const ds=recDS(r,y,m);
    if(!S.entries.some(e=>e.recurringId===r.id&&e.date===ds))
      S.entries.push({id:S.nextEntryId++,date:ds,catId:r.catId,amount:r.amount,note:r.note||'',recurringId:r.id});
  });
}

function renderKPI(){
  const y=S.calYear,m=S.calMonth;
  const inc=mInc(y,m),exp=mExp(y,m),bal=inc-exp;
  const yi=yInc(y),ye=yExp(y),yb=yi-ye;
  const pct=inc>0?Math.round(exp/inc*100):0;
  document.getElementById('kpi-bar').innerHTML=`
    <div class="kpi"><div class="kpi-label">${MONTHS[m]} Gəlir</div><div class="kpi-val pos">+${fmt(inc)} ₼</div></div>
    <div class="kpi"><div class="kpi-label">${MONTHS[m]} Xərc</div><div class="kpi-val neg">-${fmt(exp)} ₼</div></div>
    <div class="kpi"><div class="kpi-label">${MONTHS[m]} Balans</div><div class="kpi-val ${bal>=0?'pos':'neg'}">${bal>=0?'+':''}${fmt(bal)} ₼</div><div class="kpi-sub ${bal>=0?'pos':'neg'}">${bal>=0?'Xeyir':'Zərər'} ${pct}%</div></div>
    <div class="kpi"><div class="kpi-label">${y} İllik Gəlir</div><div class="kpi-val pos">+${fmt(yi)} ₼</div></div>
    <div class="kpi"><div class="kpi-label">${y} İllik Xərc</div><div class="kpi-val neg">-${fmt(ye)} ₼</div></div>
    <div class="kpi"><div class="kpi-label">${y} Xalis Qazanc</div><div class="kpi-val ${yb>=0?'pos':'neg'}">${yb>=0?'+':''}${fmt(yb)} ₼</div><div class="kpi-sub ${yb>=0?'pos':'neg'}">${yb>=0?'Xeyirdəsiniz':'Zərərdəsiniz'}</div></div>`;
}

function showTab(t){
  S.activeTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['calendar','journal','recurring','cats','report','annual'][i]===t);});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render(t);
}
function render(t){
  applyRec(S.calYear,S.calMonth);save();renderKPI();
  if(t==='calendar')renderCal();
  else if(t==='journal')renderJournal();
  else if(t==='recurring')renderRecurring();
  else if(t==='cats')renderCats();
  else if(t==='report')renderReport();
  else if(t==='annual')renderAnnual();
}

function statusBanner(inc,exp,ctx){
  const bal=inc-exp,pct=inc>0?Math.round(Math.abs(bal)/inc*100):0;
  if(bal>0)return`<div class="status-banner profit"><div class="status-icon">📈</div><div class="status-text"><div class="status-title g">XEYİRDƏSİNİZ — +${fmt(bal)} ₼</div><div class="status-desc">${ctx} gəlirinizin <b>${pct}%</b>-ni xərclərinizdən çox qazandınız.</div></div></div>`;
  if(bal<0)return`<div class="status-banner loss"><div class="status-icon">📉</div><div class="status-text"><div class="status-title r">ZƏRƏRDƏSİNİZ — ${fmt(bal)} ₼</div><div class="status-desc">${ctx} xərclər gəliri <b>${fmt(-bal)} ₼</b> üstələdi.</div></div></div>`;
  return`<div class="status-banner even"><div class="status-icon">⚖️</div><div class="status-text"><div class="status-title b">SIFIRDA</div></div></div>`;
}

function renderCal(){
  const {calYear:y,calMonth:m}=S;applyRec(y,m);
  const today=new Date(),fl=new Date(y,m,1),ll=new Date(y,m+1,0);
  const sdow=(fl.getDay()+6)%7;
  const inc=mInc(y,m),exp=mExp(y,m);
  let h=statusBanner(inc,exp,`${MONTHS[m]} ayında`);
  h+=`<div class="stat-grid">
    <div class="stat"><div class="stat-label">Gəlir</div><div class="stat-val g">+${fmt(inc)} ₼</div></div>
    <div class="stat"><div class="stat-label">Xərc</div><div class="stat-val r">-${fmt(exp)} ₼</div></div>
    <div class="stat"><div class="stat-label">Balans</div><div class="stat-val ${inc-exp>=0?'g':'r'}">${inc-exp>=0?'+':''}${fmt(inc-exp)} ₼</div></div>
    <div class="stat"><div class="stat-label">Qeyd sayı</div><div class="stat-val b">${eForMonth(y,m).length}</div></div>
  </div>
  <div class="card"><div class="cal-nav">
    <button onclick="calPrev()">‹</button>
    <span class="cal-month">${MONTHS[m]} ${y}</span>
    <button onclick="calNext()">›</button>
  </div><div class="cal-grid">`;
  DAYS.forEach(d=>{h+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<sdow;i++){const pn=new Date(y,m,0).getDate()-sdow+i+1;h+=`<div class="cal-day other-month"><div class="day-num">${pn}</div></div>`;}
  for(let d=1;d<=ll.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const isSel=S.selectedDate===ds;
    const de=eForDay(ds);
    const de_exp=de.filter(e=>{const c=getCat(e.catId);return c&&c.type==='expense';}).reduce((s,e)=>s+e.amount,0);
    const de_inc=de.filter(e=>{const c=getCat(e.catId);return c&&c.type==='income';}).reduce((s,e)=>s+e.amount,0);
    const hasRec=de.some(e=>e.recurringId);
    const dots=de.slice(0,6).map(e=>{const c=getCat(e.catId);return`<div class="dot" style="background:${e.recurringId?'#7a3abf':c&&c.type==='income'?'#1a5c2a':'#8b1a1a'}"></div>`;}).join('');
    h+=`<div class="cal-day${isT?' today':''}${isSel?' selected':''}${hasRec?' has-rec':''}" onclick="selDay('${ds}')">
      <div class="day-num">${d}</div>
      ${de_exp>0?`<div class="day-exp">-${fmtS(de_exp)}₼</div>`:''}
      ${de_inc>0?`<div class="day-inc">+${fmtS(de_inc)}₼</div>`:''}
      ${hasRec?`<div style="font-size:8px;color:#7a3abf">🔁</div>`:''}
      <div class="day-dots">${dots}</div>
    </div>`;
  }
  const rem=(7-(sdow+ll.getDate())%7)%7;
  for(let i=1;i<=rem;i++)h+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  h+='</div></div>';
  if(S.selectedDate){
    const[sy,sm2,sd]=S.selectedDate.split('-');
    const se=eForDay(S.selectedDate);
    h+=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;color:#1F3864">${parseInt(sd)} ${MONTHS[parseInt(sm2)-1]} ${sy}</div>
      <div style="display:flex;gap:5px">
        <button class="btn pu sm" onclick="openAddRec('${S.selectedDate}')">🔁 Sabit</button>
        <button class="btn pr sm" onclick="openAdd('${S.selectedDate}')">+ Əlavə et</button>
      </div></div>`;
    if(!se.length){h+=`<div style="text-align:center;color:#ccc;padding:1.2rem;font-size:12px">Bu gün üçün qeyd yoxdur</div>`;}
    else{
      h+='<div class="entry-list">';
      se.forEach(e=>{
        const cat=getCat(e.catId);if(!cat)return;
        const ii=cat.type==='income';
        h+=`<div class="ei${e.recurringId?' rec-ei':''}">
          <span class="badge ${ii?'bi':'be'}">${cat.group}</span>
          <span class="ei-cat"><span style="font-weight:600">${cat.name}</span>${e.recurringId?'<span class="badge br" style="margin-left:4px">🔁</span>':''}${e.note?`<span style="color:#bbb;font-size:10px;display:block">${e.note}</span>`:''}</span>
          <span class="ei-amt ${ii?'g':'r'}">${ii?'+':'-'}${fmt(e.amount)} ₼</span>
          <span class="ei-edit" onclick="openEdit(${e.id})">✏️</span>
          <span class="ei-del" onclick="delEntry(${e.id})">✕</span>
        </div>`;
      });
      const di=se.filter(e=>{const c=getCat(e.catId);return c&&c.type==='income';}).reduce((s,e)=>s+e.amount,0);
      const de2=se.filter(e=>{const c=getCat(e.catId);return c&&c.type==='expense';}).reduce((s,e)=>s+e.amount,0);
      if(se.length>1)h+=`<div style="display:flex;justify-content:flex-end;gap:14px;margin-top:7px;padding-top:7px;border-top:1px solid #f0f0f0;font-size:11px;font-weight:700">
        ${di>0?`<span class="g">+${fmt(di)} ₼</span>`:''}
        ${de2>0?`<span class="r">-${fmt(de2)} ₼</span>`:''}
        <span style="color:#888">Balans: <span class="${di-de2>=0?'g':'r'}">${di-de2>=0?'+':''}${fmt(di-de2)} ₼</span></span>
      </div>`;
      h+='</div>';
    }
    h+='</div>';
  }
  document.getElementById('tab-calendar').innerHTML=h;
}

function calPrev(){if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;S.selectedDate=null;render('calendar');}
function calNext(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;S.selectedDate=null;render('calendar');}
function selDay(d){S.selectedDate=S.selectedDate===d?null:d;renderCal();}

function openAdd(ds){
  const[y,m,d]=ds.split('-');
  const opts=S.categories.map(c=>`<option value="${c.id}">${c.type==='income'?'[GƏLİR]':'[XƏRC]'} ${c.group} — ${c.name}</option>`).join('');

    <h3>📝 ${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}</h3>

  </div></div>`;
  setTimeout(()=>{const a=document.getElementById('ma');if(a)a.focus();},80);

function saveEntry(ds){
  const catId=parseInt(document.getElementById('mc').value);
  const amt=parseFloat(document.getElementById('ma').value)||0;
  const note=document.getElementById('mn').value.trim();
  if(amt<=0){alert('Məbləğ 0-dan böyük olmalıdır!');return;}
  S.entries.push({id:S.nextEntryId++,date:ds,catId,amount:amt,note});

  else if(e&&!e.recurringId&&!confirm('Bu qeyd silinsin?'))return;

function closeM(){document.getElementById('modal-root').innerHTML='';}

function toggleRec(id,val){const r=S.recurring.find(x=>x.id===id);if(r){r.active=val;save();}}
function deleteRec(id){if(!confirm('Sabit qeyd silinsin?'))return;S.recurring=S.recurring.filter(r=>r.id!==id);save();renderRecurring();}
function openAddRec(ds){

  </div></div>`;

function saveRec(){
  const catId=parseInt(document.getElementById('rc').value);
  const amt=parseFloat(document.getElementById('ra').value)||0;
  const day=parseInt(document.getElementById('rd').value)||1;
  const note=document.getElementById('rn').value.trim();
  const freq=document.getElementById('rf').value;
  if(amt<=0){alert('Məbləğ 0-dan böyük!');return;}
  let months=[];
  if(freq==='custom'){document.querySelectorAll('input[name="rm"]:checked').forEach(cb=>months.push(parseInt(cb.value)));if(!months.length){alert('Ən az bir ay!');return;}}
  else months=Array.from({length:12},(_,i)=>i);
  const rec={id:S.nextRecId++,catId,amount:amt,dayOfMonth:day,note,freq,months,active:true};
  S.recurring.push(rec);
  for(let mi=0;mi<12;mi++)if(recOk(rec,S.calYear,mi))applyRec(S.calYear,mi);
  save();closeM();render(S.activeTab);
}
function editRec(id){
  const rec=S.recurring.find(r=>r.id===id);if(!rec)return;
  const opts=S.categories.map(c=>`<option value="${c.id}" ${c.id===rec.catId?'selected':''}>${c.type==='income'?'[GƏLİR]':'[XƏRC]'} ${c.group} — ${c.name}</option>`).join('');
  const mch=MONTHS.map((mn,i)=>`<label class="mcb"><input type="checkbox" name="em" value="${i}" ${rec.months.includes(i)?'checked':''}> ${mn}</label>`).join('');
  document.getElementById('modal-root').innerHTML=`<div class="modal-wrap" onclick="if(event.target===this)closeM()"><div class="modal">
    <h3>✏️ Sabit Qeydi Düzəlt</h3>
    <div class="form-row"><label>Maddə</label><select id="ec">${opts}</select></div>
    <div class="form-row"><label>Məbləğ (₼)</label><input type="number" id="ea" value="${rec.amount}" min="0.01" step="0.01"></div>
    <div class="form-row"><label>Ayın günü</label><input type="number" id="eday" value="${rec.dayOfMonth}" min="1" max="31"></div>
    <div class="form-row"><label>Açıqlama</label><input type="text" id="en" value="${rec.note||''}"></div>
    <div class="form-row"><label>Tezlik</label>
      <select id="ef" onchange="document.getElementById('emw').style.display=this.value==='custom'?'block':'none'">
        <option value="monthly" ${rec.freq==='monthly'?'selected':''}>Hər ay</option>
        <option value="custom" ${rec.freq==='custom'?'selected':''}>Seçilmiş aylarda</option>
      </select></div>
    <div id="emw" style="display:${rec.freq==='custom'?'block':'none'}"><div class="form-row"><label>Hansı aylarda?</label><div class="months-check">${mch}</div></div></div>
    <div class="btn-row"><button class="btn pu" onclick="updateRec(${id})">Saxla</button><button class="btn" onclick="closeM()">Ləğv et</button></div>
  </div></div>`;
}
function updateRec(id){
  const rec=S.recurring.find(r=>r.id===id);if(!rec)return;
  const amt=parseFloat(document.getElementById('ea').value)||0;if(amt<=0){alert('Məbləğ 0-dan böyük!');return;}
  const freq=document.getElementById('ef').value;
  let months=[];
  if(freq==='custom'){document.querySelectorAll('input[name="em"]:checked').forEach(cb=>months.push(parseInt(cb.value)));if(!months.length){alert('Ən az bir ay!');return;}}
  else months=Array.from({length:12},(_,i)=>i);
  rec.catId=parseInt(document.getElementById('ec').value);rec.amount=amt;
  rec.dayOfMonth=parseInt(document.getElementById('eday').value)||1;
  rec.note=document.getElementById('en').value.trim();rec.freq=freq;rec.months=months;
  S.entries=S.entries.filter(e=>e.recurringId!==id);
  for(let mi=0;mi<12;mi++)if(recOk(rec,S.calYear,mi))applyRec(S.calYear,mi);
  save();closeM();renderRecurring();
}

function updName(id,v){const c=getCat(id);if(c){c.name=v.trim();save();}}

function delCat(id){

  S.categories=S.categories.filter(c=>c.id!==id);S.entries=S.entries.filter(e=>e.catId!==id);S.recurring=S.recurring.filter(r=>r.catId!==id);

function renderReport(){
  const y=S.calYear,m=S.calMonth;
  const inc=mInc(y,m),exp=mExp(y,m),bal=inc-exp;
  const totalBud=S.categories.filter(c=>c.type==='expense').reduce((s,c)=>s+(c.budget||0),0);
  let h=statusBanner(inc,exp,`${MONTHS[m]} ayında`);
  h+=`<div class="stat-grid">
    <div class="stat"><div class="stat-label">${MONTHS[m]} Gəlir</div><div class="stat-val g">+${fmt(inc)} ₼</div></div>
    <div class="stat"><div class="stat-label">${MONTHS[m]} Xərc</div><div class="stat-val r">-${fmt(exp)} ₼</div></div>
    <div class="stat"><div class="stat-label">Balans</div><div class="stat-val ${bal>=0?'g':'r'}">${bal>=0?'+':''}${fmt(bal)} ₼</div></div>
    <div class="stat"><div class="stat-label">Büdcə istifadəsi</div><div class="stat-val gd">${totalBud>0?Math.round(exp/totalBud*100):0}%</div></div>
  </div>`;
  const catT=S.categories.filter(c=>c.type==='expense').map(c=>({cat:c,total:eForMonth(y,m).filter(e=>e.catId===c.id).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxV=catT.length>0?catT[0].total:1;
  h+=`<div class="card"><div class="card-title">${MONTHS[m]} ${y} — Xərc maddələri</div>`;
  if(!catT.length){h+=`<div style="text-align:center;color:#ccc;padding:1.5rem;font-size:12px">Bu ay xərc yoxdur</div>`;}
  else{catT.forEach(({cat,total})=>{
    const pct=Math.round(total/maxV*100),over=cat.budget>0&&total>cat.budget;
    const bp=cat.budget>0?Math.round(total/cat.budget*100):0;
    h+=`<div class="bar-row"><div class="bar-label" title="${cat.name}">${cat.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${over?'#c0392b':'#2c5f8a'}"></div></div>
      <div class="bar-amt ${over?'r':''}">${fmt(total)} ₼${cat.budget>0?`<span style="font-size:9px;color:${over?'#c0392b':'#bbb'}"> (${bp}%)</span>`:''}</div></div>`;
  });}
  h+='</div>';
  const incT=S.categories.filter(c=>c.type==='income').map(c=>({cat:c,total:eForMonth(y,m).filter(e=>e.catId===c.id).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  if(incT.length){
    const maxI=incT[0].total;
    h+=`<div class="card"><div class="card-title">${MONTHS[m]} ${y} — Gəlir maddələri</div>`;
    incT.forEach(({cat,total})=>{const pct=Math.round(total/maxI*100);h+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#27ae60"></div></div><div class="bar-amt g">${fmt(total)} ₼</div></div>`;});
    h+='</div>';
  }
  h+=`<div class="card" style="overflow-x:auto"><div class="card-title">Maddələr üzrə aylıq cədvəl — ${y}</div>
  <table class="cat-month-tbl"><thead><tr><th>Maddə</th>`;
  MONTHS.forEach(mn=>{h+=`<th>${mn.slice(0,3)}</th>`;});
  h+=`<th>CƏM</th></tr></thead><tbody>`;
  const allC=[...S.categories.filter(c=>c.type==='expense'),...S.categories.filter(c=>c.type==='income')];
  let colT=new Array(12).fill(0);
  allC.forEach(cat=>{
    const mv=MONTHS.map((_,mi)=>eForYear(y).filter(e=>e.catId===cat.id&&new Date(e.date).getMonth()===mi).reduce((s,e)=>s+e.amount,0));
    const rt=mv.reduce((s,v)=>s+v,0);if(rt===0)return;
    const ii=cat.type==='income';
    h+=`<tr><td><span class="badge ${ii?'bi':'be'}" style="margin-right:3px">${cat.group}</span>${cat.name}</td>`;
    mv.forEach((v,mi)=>{if(ii)colT[mi]+=v;else colT[mi]-=v;h+=`<td class="${v>0?(ii?'nzi':'nz'):''}'">${v>0?fmt(v):'—'}</td>`;});
    h+=`<td style="font-weight:700" class="${ii?'g':'r'}">${fmt(rt)}</td></tr>`;
  });
  h+=`<tr class="tr-row"><td>Aylıq balans</td>`;
  colT.forEach(v=>{h+=`<td class="${v>0?'g':v<0?'r':''}">${v!==0?(v>0?'+':'')+fmt(v):'—'}</td>`;});
  const gb=colT.reduce((s,v)=>s+v,0);
  h+=`<td class="${gb>=0?'g':'r'}">${gb>=0?'+':''}${fmt(gb)}</td></tr>`;
  h+='</tbody></table></div>';
  document.getElementById('tab-report').innerHTML=h;
}

    <div class="profit-box-label">${bal>0?'İL BOYUNCA XEYİRDƏSİNİZ':bal<0?'İL BOYUNCA ZƏRƏRDƏSİNİZ':'İL BOYUNCA SIFIRDADIR'} — ${y}</div>
  </div>`;
  h+=`<div class="stat-grid">

    <div class="stat"><div class="stat-label">İllik xərc</div><div class="stat-val r">-${fmt(exp)} ₼</div></div>

      <div style="font-size:11px;" class="r">${me>0?'-'+fmt(me)+' ₼':'—'}</div>
      <div style="font-size:12px;font-weight:700" class="${mb>=0?'g':'r'}">${(mi2||me)?(mb>=0?'+':'')+fmt(mb)+' ₼':'—'}</div>
      <div style="font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;background:${mb>=0?'#e8f5e0':'#fff0f0'};color:${mb>=0?'#1a5c2a':'#8b1a1a'}">${mb>=0?'Xeyir':'Zərər'}</div>
      <div style="font-size:10px;color:#aaa">Yığım: ${fmt(cum)} ₼</div>
    </div>`;
  });
  h+=`<div class="mth-row ann">
    <div style="font-size:12px;font-weight:700;color:#fff">İLLİK</div>
    <div style="font-size:11px;color:#6ee77a;font-weight:600">+${fmt(inc)} ₼</div>
    <div style="font-size:11px;color:#ff9999;font-weight:600">-${fmt(exp)} ₼</div>
    <div style="font-size:13px;font-weight:800;color:${bal>=0?'#6ee77a':'#ff7b7b'}">${bal>=0?'+':''}${fmt(bal)} ₼</div>
    <div style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;background:${bal>=0?'#1a5c2a':'#8b1a1a'};color:#fff">${bal>=0?'XEYİR':'ZƏRƏR'}</div>
    <div></div>
  </div></div>`;
  const topExp=S.categories.filter(c=>c.type==='expense').map(c=>({cat:c,total:eForYear(y).filter(e=>e.catId===c.id).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,10);
  if(topExp.length){
    const maxV=topExp[0].total;
    h+=`<div class="card"><div class="card-title">${y} — Ən çox xərc (Top 10)</div>`;
    topExp.forEach(({cat,total},i)=>{
      const pct=Math.round(total/maxV*100),sh=exp>0?Math.round(total/exp*100):0;
      h+=`<div class="bar-row"><div class="bar-label">${i+1}. ${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#c0392b"></div></div><div class="bar-amt r">${fmt(total)} ₼ <span style="font-size:9px;color:#bbb">${sh}%</span></div></div>`;
    });
    h+='</div>';
  }
  document.getElementById('tab-annual').innerHTML=h;
}

// BAŞLAT
init();
</script>
</body>
</html>
